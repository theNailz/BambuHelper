; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini, ESP32-2432S028 (CYD), ESP32-C3 Super Mini

; --- Shared library dependencies ---
[common]
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; =============================================================================
;  ESP32-S3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3\"
    -D BOARD_IS_S3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-2432S028 (CYD - Cheap Yellow Display) + ILI9342 240x320
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = min_spiffs.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- CYD touch (XPT2046 on separate SPI bus) ---
    -D USE_XPT2046=1
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- Layout profile ---
    -D DISPLAY_CYD=1
    -D BOARD_VARIANT=\"cyd\"
    -D BACKLIGHT_PIN=21

; =============================================================================
;  ESP32-C3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb_c3.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3\"
    -D BOARD_IS_C3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-C3 Super Mini — headless (no physical screen, virtual display via HTTP)
; =============================================================================
[env:esp32c3-headless]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb_c3.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3\"
    -D BOARD_IS_C3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D HEADLESS=1
