; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini and ESP32-2432S028 (CYD)

; --- Shared library dependencies ---
[common]
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TFT_eWidget@^0.0.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; --- Shared TFT_eSPI + font flags (driver/pins are per-env) ---
common_flags =
    -D USER_SETUP_LOADED=1
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

; =============================================================================
;  ESP32-S3 Super Mini + ST7789 240x240 
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    ${common.common_flags}
    -D BOARD_VARIANT=\"esp32s3\"
    -D SPI_FREQUENCY=40000000
    ; --- Display driver ---
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPI pins (S3 Super Mini) ---
    -D TFT_MOSI=11  ;SDA
    -D TFT_SCLK=12  ;SCL
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=8  ;14
    -D TFT_BL=13
    -D USE_FSPI_PORT=1

; =============================================================================
;  ESP32-2432S028 (CYD - Cheap Yellow Display) + ILI9341 240x320
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = default.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ${common.common_flags}
    -D SPI_FREQUENCY=27000000
    ; --- Display driver ---
    ; ILI9341_2 works for both ILI9341 and ILI9342 CYD variants
    -D ILI9341_2_DRIVER=1
    -D TFT_INVERSION_ON=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    ; --- CYD display SPI pins ---
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=12
    -D TFT_BL=21
    ; --- CYD touch (XPT2046 on separate SPI bus) ---
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    -D USE_XPT2046=1
    ; --- Layout profile ---
    -D DISPLAY_CYD=1
    -D BOARD_VARIANT=\"cyd\"

; =============================================================================
;  ESP32-C3 Super Mini + ST7789 240x280
; =============================================================================
[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
extra_scripts = pre:scripts/patch_spi_for_esp32-c3.py
lib_deps = ${common.lib_deps}
build_flags =
    ${common.common_flags}
    -D SPI_FREQUENCY=40000000
    ; --- Display driver ---
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=280
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPI pins (C3 Super Mini) ---
    -D TFT_MOSI=20  ;SDA
    -D TFT_SCLK=21  ;SCL
    -D TFT_CS=6
    -D TFT_DC=7
    -D TFT_RST=10
    -D TFT_BL=5
    -D BOARD_VARIANT=\"esp32c3\"
